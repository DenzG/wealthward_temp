<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSCR ↔ ETH Token Swap</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .swap-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .swap-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .token-input {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .token-input:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .token-label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .token-balance {
            font-size: 12px;
            color: #666;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .amount-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 24px;
            font-weight: 600;
            color: #333;
            outline: none;
        }

        .amount-input::placeholder {
            color: #adb5bd;
        }

        .token-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 25px;
            padding: 8px 15px;
            font-weight: 600;
            color: #333;
            min-width: 80px;
            justify-content: center;
        }

        .swap-arrow {
            display: flex;
            justify-content: center;
            margin: -10px 0;
            z-index: 1;
        }

        .swap-button {
            background: #667eea;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .swap-button:hover {
            transform: rotate(180deg);
            background: #5a67d8;
        }

        .swap-button svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .price-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            display: none;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .price-row:last-child {
            margin-bottom: 0;
            font-weight: 600;
            color: #333;
        }

        .price-label {
            color: #666;
        }

        .price-value {
            color: #333;
        }

        .connect-button, .swap-execute-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .connect-button:hover, .swap-execute-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .connect-button:disabled, .swap-execute-button:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .api-key-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .api-key-input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="swap-container">
        <div class="header">
            <h1>CSCR ↔ ETH Swap</h1>
            <p>Swap CSCR tokens for ETH and vice versa</p>
        </div>

        <div class="swap-form">
            <input 
                type="password" 
                class="api-key-input" 
                id="apiKey" 
                placeholder="Enter your 0x API key"
                required
            >

            <div class="token-input" id="sellTokenInput">
                <div class="token-header">
                    <span class="token-label">You Pay</span>
                    <span class="token-balance" id="sellBalance">Balance: --</span>
                </div>
                <div class="input-row">
                    <input 
                        type="number" 
                        class="amount-input" 
                        id="sellAmount" 
                        placeholder="0.0"
                        step="any"
                    >
                    <div class="token-selector" id="sellToken">
                        <span id="sellTokenSymbol">CSCR</span>
                    </div>
                </div>
            </div>

            <div class="swap-arrow">
                <button class="swap-button" id="swapDirection">
                    <svg viewBox="0 0 24 24">
                        <path d="M7 14l5-5 5 5H7z"/>
                        <path d="M7 10l5 5 5-5H7z"/>
                    </svg>
                </button>
            </div>

            <div class="token-input" id="buyTokenInput">
                <div class="token-header">
                    <span class="token-label">You Receive</span>
                    <span class="token-balance" id="buyBalance">Balance: --</span>
                </div>
                <div class="input-row">
                    <input 
                        type="number" 
                        class="amount-input" 
                        id="buyAmount" 
                        placeholder="0.0"
                        readonly
                    >
                    <div class="token-selector" id="buyToken">
                        <span id="buyTokenSymbol">ETH</span>
                    </div>
                </div>
            </div>

            <div class="price-info" id="priceInfo">
                <div class="price-row">
                    <span class="price-label">Exchange Rate</span>
                    <span class="price-value" id="exchangeRate">--</span>
                </div>
                <div class="price-row">
                    <span class="price-label">Network Fee</span>
                    <span class="price-value" id="networkFee">--</span>
                </div>
                <div class="price-row">
                    <span class="price-label">You'll Receive</span>
                    <span class="price-value" id="finalAmount">--</span>
                </div>
            </div>

            <button class="connect-button" id="connectWallet">
                Connect Wallet
            </button>

            <button class="swap-execute-button" id="executeSwap" style="display: none;" disabled>
                Enter Amount
            </button>

            <div class="status-message" id="statusMessage"></div>
        </div>
    </div>

    <script>
        class TokenSwap {
            constructor() {
                this.web3 = null;
                this.userAddress = null;
                this.apiKey = null;
                
                // Token configurations
                this.tokens = {
                    CSCR: {
                        address: '0x9C9580A8915d2797fb9E9651c93aE1559D8A498e',
                        symbol: 'CSCR',
                        decimals: 18
                    },
                    ETH: {
                        address: '0xeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee',
                        symbol: 'ETH',
                        decimals: 18
                    }
                };

                this.currentSellToken = 'CSCR';
                this.currentBuyToken = 'ETH';
                this.currentQuote = null;

                // ERC20 ABI for token operations
                this.erc20Abi = [
                    {
                        "constant": true,
                        "inputs": [{"name": "_owner", "type": "address"}],
                        "name": "balanceOf",
                        "outputs": [{"name": "balance", "type": "uint256"}],
                        "type": "function"
                    },
                    {
                        "constant": true,
                        "inputs": [{"name": "_owner", "type": "address"}, {"name": "_spender", "type": "address"}],
                        "name": "allowance",
                        "outputs": [{"name": "", "type": "uint256"}],
                        "type": "function"
                    },
                    {
                        "constant": false,
                        "inputs": [{"name": "_spender", "type": "address"}, {"name": "_value", "type": "uint256"}],
                        "name": "approve",
                        "outputs": [{"name": "", "type": "bool"}],
                        "type": "function"
                    },
                    {
                        "constant": true,
                        "inputs": [],
                        "name": "decimals",
                        "outputs": [{"name": "", "type": "uint8"}],
                        "type": "function"
                    }
                ];

                this.initializeEventListeners();
            }

            initializeEventListeners() {
                document.getElementById('connectWallet').addEventListener('click', () => this.connectWallet());
                document.getElementById('swapDirection').addEventListener('click', () => this.swapTokenDirection());
                document.getElementById('sellAmount').addEventListener('input', () => this.handleAmountChange());
                document.getElementById('executeSwap').addEventListener('click', () => this.executeSwap());
                document.getElementById('apiKey').addEventListener('input', () => this.handleApiKeyChange());
            }

            handleApiKeyChange() {
                const apiKey = document.getElementById('apiKey').value.trim();
                this.apiKey = apiKey;
                
                if (apiKey && this.userAddress) {
                    this.updateBalances();
                }
            }

            async connectWallet() {
                try {
                    if (typeof window.ethereum === 'undefined') {
                        this.showStatus('Please install MetaMask to use this application', 'error');
                        return;
                    }

                    this.showStatus('Connecting wallet...', 'info');
                    
                    // Request account access
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Initialize Web3
                    this.web3 = new Web3(window.ethereum);
                    
                    // Get user accounts
                    const accounts = await this.web3.eth.getAccounts();
                    this.userAddress = accounts[0];

                    // Switch to Ethereum mainnet if needed
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: '0x1' }], // Ethereum mainnet
                        });
                    } catch (switchError) {
                        this.showStatus('Please switch to Ethereum mainnet', 'error');
                        return;
                    }

                    document.getElementById('connectWallet').textContent = `Connected: ${this.userAddress.slice(0, 6)}...${this.userAddress.slice(-4)}`;
                    document.getElementById('connectWallet').disabled = true;
                    document.getElementById('executeSwap').style.display = 'block';

                    this.showStatus('Wallet connected successfully!', 'success');
                    
                    if (this.apiKey) {
                        await this.updateBalances();
                    }

                } catch (error) {
                    console.error('Error connecting wallet:', error);
                    this.showStatus('Failed to connect wallet', 'error');
                }
            }

            async updateBalances() {
                // if (!this.web3 || !this.userAddress || !this.api
                
                if (!this.web3 || !this.userAddress || !this.apiKey) return;

                try {
                    // Get ETH balance
                    const ethBalanceWei = await this.web3.eth.getBalance(this.userAddress);
                    const ethBalance = this.web3.utils.fromWei(ethBalanceWei, 'ether');
                    const ethBalanceFormatted = parseFloat(ethBalance).toFixed(4);

                    // Get CSCR balance
                    const cscrContract = new this.web3.eth.Contract(this.erc20Abi, this.tokens.CSCR.address);
                    const cscrBalanceWei = await cscrContract.methods.balanceOf(this.userAddress).call();
                    const cscrBalance = this.web3.utils.fromWei(cscrBalanceWei, 'ether');
                    const cscrBalanceFormatted = parseFloat(cscrBalance).toFixed(4);

                    // Update UI
                    if (this.currentSellToken === 'CSCR') {
                        document.getElementById('sellBalance').textContent = `Balance: ${cscrBalanceFormatted} CSCR`;
                        document.getElementById('buyBalance').textContent = `Balance: ${ethBalanceFormatted} ETH`;
                    } else {
                        document.getElementById('sellBalance').textContent = `Balance: ${ethBalanceFormatted} ETH`;
                        document.getElementById('buyBalance').textContent = `Balance: ${cscrBalanceFormatted} CSCR`;
                    }

                } catch (error) {
                    console.error('Error updating balances:', error);
                    document.getElementById('sellBalance').textContent = 'Balance: Error';
                    document.getElementById('buyBalance').textContent = 'Balance: Error';
                }
            }

            swapTokenDirection() {
                // Swap the current tokens
                const tempToken = this.currentSellToken;
                this.currentSellToken = this.currentBuyToken;
                this.currentBuyToken = tempToken;

                // Update UI
                document.getElementById('sellTokenSymbol').textContent = this.tokens[this.currentSellToken].symbol;
                document.getElementById('buyTokenSymbol').textContent = this.tokens[this.currentBuyToken].symbol;

                // Clear amounts
                document.getElementById('sellAmount').value = '';
                document.getElementById('buyAmount').value = '';
                document.getElementById('priceInfo').style.display = 'none';

                // Update balances
                this.updateBalances();

                // Update execute button
                this.updateExecuteButton();
            }

            async handleAmountChange() {
                const sellAmount = document.getElementById('sellAmount').value;
                
                if (!sellAmount || parseFloat(sellAmount) <= 0) {
                    document.getElementById('buyAmount').value = '';
                    document.getElementById('priceInfo').style.display = 'none';
                    this.updateExecuteButton();
                    return;
                }

                if (!this.apiKey) {
                    this.showStatus('Please enter your 0x API key', 'error');
                    return;
                }

                await this.getQuote(sellAmount);
            }

            async getQuote(sellAmount) {
                try {
                    this.showStatus('Getting quote...', 'info');

                    const sellToken = this.tokens[this.currentSellToken];
                    const buyToken = this.tokens[this.currentBuyToken];
                    
                    // Convert amount to wei
                    const sellAmountWei = this.web3.utils.toWei(sellAmount, 'ether');

                    const params = new URLSearchParams({
                        chainId: '1', // Ethereum mainnet
                        sellToken: sellToken.address,
                        buyToken: buyToken.address,
                        sellAmount: sellAmountWei,
                        taker: this.userAddress || '0x0000000000000000000000000000000000000000',
                        slippageBps: '100' // 1% slippage
                    });

                    const response = await fetch(`https://api.0x.org/swap/allowance-holder/price?${params}`, {
                        headers: {
                            '0x-api-key': this.apiKey,
                            '0x-version': 'v2'
                        }
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
                    }

                    const quote = await response.json();
                    
                    if (!quote.liquidityAvailable) {
                        throw new Error('No liquidity available for this trade');
                    }

                    this.currentQuote = quote;
                    this.displayQuote(quote, sellAmount);
                    this.hideStatus();

                } catch (error) {
                    console.error('Error getting quote:', error);
                    this.showStatus(`Error getting quote: ${error.message}`, 'error');
                    document.getElementById('buyAmount').value = '';
                    document.getElementById('priceInfo').style.display = 'none';
                }

                this.updateExecuteButton();
            }

            displayQuote(quote, sellAmount) {
                const buyToken = this.tokens[this.currentBuyToken];
                const sellToken = this.tokens[this.currentSellToken];

                // Format buy amount
                const buyAmount = this.web3.utils.fromWei(quote.buyAmount, 'ether');
                document.getElementById('buyAmount').value = parseFloat(buyAmount).toFixed(6);

                // Calculate exchange rate
                const rate = parseFloat(buyAmount) / parseFloat(sellAmount);
                document.getElementById('exchangeRate').textContent = 
                    `1 ${sellToken.symbol} = ${rate.toFixed(6)} ${buyToken.symbol}`;

                // Format network fee
                const networkFee = quote.totalNetworkFee ? 
                    `${parseFloat(this.web3.utils.fromWei(quote.totalNetworkFee, 'ether')).toFixed(6)} ETH` : 
                    'Included';
                document.getElementById('networkFee').textContent = networkFee;

                // Final amount (same as buy amount for price quotes)
                document.getElementById('finalAmount').textContent = 
                    `${parseFloat(buyAmount).toFixed(6)} ${buyToken.symbol}`;

                document.getElementById('priceInfo').style.display = 'block';
            }

            updateExecuteButton() {
                const executeButton = document.getElementById('executeSwap');
                const sellAmount = document.getElementById('sellAmount').value;
                const buyAmount = document.getElementById('buyAmount').value;

                if (!this.userAddress) {
                    executeButton.textContent = 'Connect Wallet';
                    executeButton.disabled = true;
                } else if (!this.apiKey) {
                    executeButton.textContent = 'Enter API Key';
                    executeButton.disabled = true;
                } else if (!sellAmount || parseFloat(sellAmount) <= 0) {
                    executeButton.textContent = 'Enter Amount';
                    executeButton.disabled = true;
                } else if (!buyAmount) {
                    executeButton.textContent = 'Getting Quote...';
                    executeButton.disabled = true;
                } else {
                    executeButton.textContent = `Swap ${this.tokens[this.currentSellToken].symbol} for ${this.tokens[this.currentBuyToken].symbol}`;
                    executeButton.disabled = false;
                }
            }

            async executeSwap() {
                if (!this.currentQuote || !this.userAddress || !this.apiKey) {
                    this.showStatus('Missing required data for swap', 'error');
                    return;
                }

                try {
                    const executeButton = document.getElementById('executeSwap');
                    executeButton.innerHTML = '<span class="loading"></span>Executing Swap...';
                    executeButton.disabled = true;

                    // Get firm quote for execution
                    const sellAmount = document.getElementById('sellAmount').value;
                    const firmQuote = await this.getFirmQuote(sellAmount);

                    if (!firmQuote) {
                        throw new Error('Failed to get firm quote');
                    }

                    // Check and handle allowances if needed
                    if (this.currentSellToken !== 'ETH') {
                        await this.handleAllowance(firmQuote);
                    }

                    // Execute the swap transaction
                    await this.sendSwapTransaction(firmQuote);

                } catch (error) {
                    console.error('Error executing swap:', error);
                    this.showStatus(`Swap failed: ${error.message}`, 'error');
                } finally {
                    this.updateExecuteButton();
                }
            }

            async getFirmQuote(sellAmount) {
                const sellToken = this.tokens[this.currentSellToken];
                const buyToken = this.tokens[this.currentBuyToken];
                const sellAmountWei = this.web3.utils.toWei(sellAmount, 'ether');

                const params = new URLSearchParams({
                    chainId: '1',
                    sellToken: sellToken.address,
                    buyToken: buyToken.address,
                    sellAmount: sellAmountWei,
                    taker: this.userAddress,
                    slippageBps: '100'
                });

                const response = await fetch(`https://api.0x.org/swap/allowance-holder/quote?${params}`, {
                    headers: {
                        '0x-api-key': this.apiKey,
                        '0x-version': 'v2'
                    }
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
                }

                return await response.json();
            }

            async handleAllowance(quote) {
                // Check if allowance is needed
                if (!quote.issues?.allowance) {
                    return; // No allowance needed
                }

                this.showStatus('Checking token allowance...', 'info');

                const tokenContract = new this.web3.eth.Contract(
                    this.erc20Abi,
                    this.tokens[this.currentSellToken].address
                );

                const spender = quote.issues.allowance.spender;
                const currentAllowance = await tokenContract.methods.allowance(this.userAddress, spender).call();
                const sellAmountWei = this.web3.utils.toWei(
                    document.getElementById('sellAmount').value,
                    'ether'
                );

                if (this.web3.utils.toBN(currentAllowance).lt(this.web3.utils.toBN(sellAmountWei))) {
                    this.showStatus('Approving token allowance...', 'info');
                    
                    // Approve the exact amount needed
                    const approveTx = await tokenContract.methods.approve(spender, sellAmountWei).send({
                        from: this.userAddress
                    });
                    
                    this.showStatus('Token allowance approved!', 'success');
                }
            }

            async sendSwapTransaction(quote) {
                this.showStatus('Sending swap transaction...', 'info');

                const txParams = {
                    from: this.userAddress,
                    to: quote.transaction.to,
                    data: quote.transaction.data,
                    value: quote.transaction.value || '0',
                    gas: quote.transaction.gas
                };

                try {
                    const txHash = await this.web3.eth.sendTransaction(txParams);
                    this.showStatus('Transaction sent! Waiting for confirmation...', 'info');

                    // Wait for transaction receipt
                    const receipt = await this.waitForTransactionReceipt(txHash);
                    
                    if (receipt.status) {
                        this.showStatus(`Swap successful! Transaction: ${txHash}`, 'success');
                        
                        // Clear form and update balances
                        document.getElementById('sellAmount').value = '';
                        document.getElementById('buyAmount').value = '';
                        document.getElementById('priceInfo').style.display = 'none';
                        
                        setTimeout(() => {
                            this.updateBalances();
                        }, 2000);
                    } else {
                        throw new Error('Transaction failed');
                    }
                } catch (error) {
                    throw new Error(`Transaction failed: ${error.message}`);
                }
            }

            async waitForTransactionReceipt(txHash) {
                return new Promise((resolve, reject) => {
                    const checkReceipt = async () => {
                        try {
                            const receipt = await this.web3.eth.getTransactionReceipt(txHash);
                            if (receipt) {
                                resolve(receipt);
                            } else {
                                setTimeout(checkReceipt, 2000); // Check every 2 seconds
                            }
                        } catch (error) {
                            reject(error);
                        }
                    };
                    checkReceipt();
                });
            }

            showStatus(message, type) {
                const statusElement = document.getElementById('statusMessage');
                statusElement.textContent = message;
                statusElement.className = `status-message status-${type}`;
                statusElement.style.display = 'block';

                if (type === 'success') {
                    setTimeout(() => this.hideStatus(), 5000);
                }
            }

            hideStatus() {
                const statusElement = document.getElementById('statusMessage');
                statusElement.style.display = 'none';
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            new TokenSwap();
        });
    </script>
</body>
</html>
